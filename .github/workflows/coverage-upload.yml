# Auto-generated by QualityFlow Coverage Onboarding
# Two coverage strategies:
#   1. Unit/integration test coverage — pytest --cov (runs every push/PR)
#   2. Runtime product coverage — CoverPort HTTP server on port 53700
name: Coverage

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test-coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt 2>/dev/null || pip install . 2>/dev/null || true
          pip install coverage

      - name: Run tests with coverage
        run: |
          coverage run -m pytest
          coverage lcov -o coverage.lcov

      - name: Upload coverage to QualityFlow
        if: always()
        env:
          QUALITYFLOW_API_KEY: ${{ secrets.QUALITYFLOW_API_KEY }}
        run: |
          curl -sk -X POST \
            -H "Content-Type: text/plain" \
            -H "X-API-Key: $QUALITYFLOW_API_KEY" \
            --data-binary @coverage.lcov \
            "https://qualityflow-dashboard-cnv-quality-flow.apps.cnv2.engineering.redhat.com/api/coverage/upload?org=RedHatQE&repo=openshift-virtualization-tests&commit=${{ github.sha }}&branch=${{ github.ref_name }}"
